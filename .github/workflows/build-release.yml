name: Build APK and Publish Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Inject signing config into app/build.gradle.kts
        run: |
          printf '\n' >> app/build.gradle.kts
          cat >> app/build.gradle.kts << 'INJECT'
          android.signingConfigs.create("releaseSigning") {
              storeFile = file("/home/runner/.android/debug.keystore")
              storePassword = "android"
              keyAlias = "androiddebugkey"
              keyPassword = "android"
          }
          android.buildTypes.getByName("release") {
              signingConfig = android.signingConfigs.getByName("releaseSigning")
          }
          INJECT

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Find APK file
        id: find_apk
        run: |
          APK=$(find app/build/outputs -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK"

      - name: Verify APK is signed
        run: |
          APK=$(find app/build/outputs -name "*.apk" | head -1)
          echo "APK: $APK"
          unzip -l "$APK" | grep META-INF || echo "No META-INF found (unsigned)"

      - name: Get version from build.gradle.kts
        id: get_version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "run_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version_name }}-${{ steps.get_version.outputs.run_number }}
          name: Release v${{ steps.get_version.outputs.version_name }}-${{ steps.get_version.outputs.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}
          files: ${{ steps.find_apk.outputs.apk_path }}
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
